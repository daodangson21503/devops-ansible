---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Deploy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/myapp.conf
    mode: '0644'
  notify: reload nginx

- name: Start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: yes
