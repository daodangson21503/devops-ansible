---
- name: Cài đặt Nginx
  dnf:
    name: nginx
    state: present

- name: Copy cấu hình Nginx từ template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Start và enable Nginx
  service:
    name: nginx
    state: started
    enabled: yes
