---
- name: Add Grafana repository
  copy:
    dest: /etc/yum.repos.d/grafana.repo
    content: |
      [grafana]
      name=grafana
      baseurl=https://rpm.grafana.com
      repo_gpgcheck=1
      enabled=1
      gpgcheck=1
      gpgkey=https://rpm.grafana.com/gpg.key
      sslverify=1
      sslcacert=/etc/pki/tls/certs/ca-bundle.crt

- name: Install Grafana
  dnf:
    name: grafana
    state: present
    update_cache: yes

- name: Configure Grafana domain and root_url
  ini_file:
    path: /etc/grafana/grafana.ini
    section: server
    option: "{{ item.option }}"
    value: "{{ item.value }}"
  loop:
    - { option: "domain", value: "grafana.mylab.local" }
    - { option: "root_url", value: "http://grafana.mylab.local" }
  notify: restart grafana

- name: Add Nginx reverse proxy config for Grafana
  copy:
    dest: /etc/nginx/conf.d/grafana.conf
    content: |
      server {
          listen 80;
          server_name grafana.mylab.local;
          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }
  notify: reload nginx

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

- name: Open firewall port 3000
  firewalld:
    port: 3000/tcp
    permanent: yes
    state: enabled
    immediate: yes
