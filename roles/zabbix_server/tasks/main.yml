---
- name: Remove conflicting zabbix packages from EPEL
  ansible.builtin.dnf:
    name:
      - zabbix-web
      - zabbix-web-mysql
    state: absent
  ignore_errors: yes

- name: Install Zabbix repo
  ansible.builtin.dnf:
    name: "https://repo.zabbix.com/zabbix/6.4/rhel/9/x86_64/zabbix-release-6.4-1.el9.noarch.rpm"
    state: present
    disable_gpg_check: yes

- name: Clean dnf cache
  ansible.builtin.command: dnf clean all

- name: Install Zabbix server + frontend + mysql
  ansible.builtin.dnf:
    name:
      - zabbix-server-mysql
      - zabbix-web-mysql
      - zabbix-apache-conf
      - zabbix-sql-scripts
      - zabbix-selinux-policy
      - zabbix-agent2
      - mysql-server
    state: present
    disablerepo: "epel,epel-modular"

- name: Start and enable MySQL
  ansible.builtin.service:
    name: mysqld
    state: started
    enabled: yes

- name: Get MySQL temporary root password
  ansible.builtin.shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}'
  register: mysql_temp_password
  changed_when: false

- name: Reset MySQL root password
  ansible.builtin.shell: |
    mysql --user=root --password="{{ mysql_temp_password.stdout }}" \
    --connect-expired-password \
    -e "ALTER USER 'root'@'localhost' IDENTIFIED BY 'Root@1234';"
  when: mysql_temp_password.stdout != ""
  ignore_errors: yes

- name: Create Zabbix database
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    encoding: utf8mb4
    collation: utf8mb4_bin
    state: present
    login_user: root
    login_password: "Root@1234"

- name: Create Zabbix DB user
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    state: present
    login_user: root
    login_password: "Root@1234"

- name: Set log_bin_trust_function_creators
  community.mysql.mysql_variables:
    variable: log_bin_trust_function_creators
    value: 1
    login_user: root
    login_password: "Root@1234"

- name: Check if schema already imported
  ansible.builtin.stat:
    path: /var/lib/zabbix/.schema_imported
  register: schema_flag

- name: Import Zabbix DB schema
  ansible.builtin.shell: |
    zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | \
    mysql --user={{ db_user }} --password={{ db_password }} {{ db_name }}
  when: not schema_flag.stat.exists

- name: Mark schema as imported
  ansible.builtin.file:
    path: /var/lib/zabbix/.schema_imported
    state: touch
  when: not schema_flag.stat.exists

- name: Configure zabbix_server.conf
  ansible.builtin.template:
    src: zabbix_server.conf.j2
    dest: /etc/zabbix/zabbix_server.conf
    owner: zabbix
    group: zabbix
    mode: '0640'
  notify: restart zabbix-server

- name: Open firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop:
    - "10050/tcp"
    - "10051/tcp"
    - "80/tcp"

- name: Start Zabbix services
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - zabbix-server
    - zabbix-agent2
    - httpd
    - php-fpm
